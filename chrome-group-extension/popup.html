<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>Tab Grouper</title>
  <style>
    body {
      width: 240px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #333;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 15px;
    }
    button {
      width: 100%;
      padding: 8px 0;
      margin-bottom: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    #groupBtn {
      background: #1a73e8;
      color: #fff;
    }
    #groupBtn:hover {
      background: #1558b0;
    }
    #dedupeBtn {
      background: #e8f0fe;
      color: #1a73e8;
    }
    #dedupeBtn:hover {
      background: #d2e3fc;
    }
    #ungroupBtn {
      background: #f1f3f4;
      color: #555;
    }
    #ungroupBtn:hover {
      background: #e0e0e0;
    }
    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h3 data-i18n="popupTitle"></h3>
  <button id="groupBtn" data-i18n="groupBtn"></button>
  <button id="dedupeBtn" data-i18n="dedupeBtn"></button>
  <button id="ungroupBtn" data-i18n="ungroupBtn"></button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
